<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>野球の作戦ボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="panel intro">
      <p class="eyebrow">Baseball Strategy Board</p>
      <h1>野球の作戦ボード</h1>
      <p class="lead">配置済みのベース画像の上で、選手とボールを動かしながら作戦線を書き込めます。</p>
    </section>

    <section class="layout">
      <aside class="panel controls">
        <div class="control-group">
          <h2>操作</h2>
          <button id="toggleDraw">描画モード: OFF</button>
          <button id="addComment">コメント追加</button>
          <button id="clearLines">線を消す</button>
          <button id="resetMarkers">マーカーを戻す</button>
        </div>

        <div class="control-group">
          <h2>線の色</h2>
          <div class="color-row">
            <button class="color-swatch active" data-color="#ffffff" style="--swatch:#ffffff;" aria-label="白"></button>
            <button class="color-swatch" data-color="#ffd166" style="--swatch:#ffd166;" aria-label="黄"></button>
            <button class="color-swatch" data-color="#ef476f" style="--swatch:#ef476f;" aria-label="赤"></button>
            <button class="color-swatch" data-color="#118ab2" style="--swatch:#118ab2;" aria-label="青"></button>
          </div>
        </div>

        <div class="control-group">
          <h2>線の太さ</h2>
          <label class="size-control" for="lineWidth">
            <input id="lineWidth" type="range" min="1" max="12" value="3">
            <span id="lineWidthValue">3px</span>
          </label>
        </div>

        <div class="control-group">
          <h2>使い方</h2>
          <ul class="tips">
            <li>描画モードが OFF のときは、マーカーをドラッグできます。</li>
            <li>描画モードが ON のときは、ボード上に線を描けます。</li>
            <li>マーカーを戻すで初期配置に戻せます。</li>
          </ul>
        </div>
      </aside>

      <section class="board-panel">
        <div class="board-frame">
          <div id="board" class="board" aria-label="野球の作戦ボード">
            <img class="board-image" src="assets/baseball-field.PNG" alt="野球の作戦ボードのベース画像">
            <canvas id="drawLayer"></canvas>
            <div id="commentToolbar" class="comment-toolbar" hidden>
              <button id="toolbarEdit" type="button">編集</button>
              <button id="toolbarDelete" type="button">削除</button>
            </div>

            <div class="marker player" data-role="7" data-label="レフト" data-x="4" data-y="13">7</div>
            <div class="marker player" data-role="8" data-label="センター" data-x="49" data-y="4.5">8</div>
            <div class="marker player" data-role="9" data-label="ライト" data-x="95" data-y="13">9</div>
            <div class="marker player" data-role="6" data-label="ショート" data-x="31" data-y="34">6</div>
            <div class="marker player" data-role="4" data-label="セカンド" data-x="67.5" data-y="34">4</div>
            <div class="marker player" data-role="5" data-label="サード" data-x="16" data-y="47.5">5</div>
            <div class="marker player" data-role="3" data-label="ファースト" data-x="82.5" data-y="47.5">3</div>
            <div class="marker player" data-role="1" data-label="ピッチャー" data-x="49.5" data-y="54.5">1</div>
            <div class="marker player" data-role="2" data-label="キャッチャー" data-x="49.5" data-y="88">2</div>

            <div class="marker ball" data-role="BALL" data-x="49.5" data-y="61" aria-label="ボール">
              <span class="ball-seam seam-a" aria-hidden="true"></span>
              <span class="ball-seam seam-b" aria-hidden="true"></span>
            </div>

            <div class="marker runner" data-role="R1" data-x="66" data-y="90">1</div>
            <div class="marker runner" data-role="R2" data-x="74.5" data-y="90">2</div>
            <div class="marker runner" data-role="R3" data-x="83" data-y="90">3</div>
            <div class="marker runner" data-role="R4" data-x="91.5" data-y="90">4</div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="commentEditorModal" class="comment-editor-modal" hidden>
    <div class="comment-editor-backdrop"></div>
    <div class="comment-editor-sheet" role="dialog" aria-modal="true" aria-labelledby="commentEditorTitle">
      <h2 id="commentEditorTitle">コメント編集</h2>
      <textarea id="commentEditorInput" rows="5" placeholder="コメントを入力"></textarea>
      <p id="commentEditorCount" class="comment-editor-count">0 / 50</p>
      <p id="commentEditorError" class="comment-editor-error" hidden>50文字以内で入力してください。</p>
      <div class="comment-editor-actions">
        <button id="cancelCommentEdit" type="button">キャンセル</button>
        <button id="saveCommentEdit" type="button">保存</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
